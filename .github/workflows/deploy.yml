name: Deploy to webgo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean up build dir (remove .git, drop server-side excludes)
        run: |
          rm -rf .git .github
          rm -f README.md SETUP.md schema.sql config.php config.example.php
          rm -f .DS_Store .gitignore
          echo "==== Wird hochgeladen: ===="
          find . -type f | sort

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Upload via lftp (FTPS, no-perms, mkdir-parents)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USER }}
          FTP_PASS:   ${{ secrets.FTP_PASS }}
        run: |
          set -e
          lftp <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:max-retries 3
          set net:timeout 30
          set net:reconnect-interval-base 5
          set mirror:set-permissions no
          set mirror:use-pget-n 0
          set ftp:use-mlsd no
          open -u "$FTP_USER","$FTP_PASS" "$FTP_SERVER"
          mirror --reverse --delete --no-perms --no-symlinks --parallel=1 --verbose ./ ./
          bye
          EOF
